<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>IP Lookup / My IP Address | Online Dev Tools</title>
<meta name="description" content="Find your public IP and lookup geolocation/network details for IPv4 addresses. Useful for debugging networking and access controls."/>
<link rel="canonical" href="https://onlinedevtools.app/ip-lookup"/><link rel="stylesheet" href="/assets/site.css">
<script>async function loadPartials(){const [h,f]=await Promise.all([fetch('/partials/header.html'),fetch('/partials/footer.html')]);document.getElementById('siteHeader').innerHTML=await h.text();document.getElementById('siteFooter').innerHTML=await f.text();}
async function myip(){const r=await fetch('https://api.ipify.org?format=json');const d=await r.json();document.getElementById("ip").value=d.ip;lookup();}
async function lookup(){const q=document.getElementById("ip").value.trim();if(!q)return;document.getElementById("status").textContent='Looking up...';try{const r=await fetch(`https://ipapi.co/${encodeURIComponent(q)}/json/`);const d=await r.json();document.getElementById("out").value=JSON.stringify(d,null,2);document.getElementById("status").textContent='Done.';}catch(e){document.getElementById("status").textContent=e.message;}}</script></head>
<body onload="loadPartials()"><div class="page"><div id="siteHeader"></div><main><div class="wrap"><section class="grid"><div class="card"><div class="pad"><nav class="breadcrumbs"><a href="/">Home</a> / <a href="/tools">Tools</a> / IP Lookup</nav><h1 class="h1">IP Lookup / My IP</h1><input id="ip" class="in" placeholder="8.8.8.8"/><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px"><button class="pill" onclick="myip()">Find My IP</button><button class="pill" onclick="lookup()">Lookup IP</button></div><div id="status" class="muted" style="margin-top:8px"></div></div></div><div class="card"><div class="pad"><h2 class="h2">Lookup Result</h2><textarea id="out" class="in" style="min-height:360px"></textarea></div></div></section></div></main><div id="siteFooter"></div></div></body></html>
