<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>WHOIS Lookup (RDAP) | Online Dev Tools</title>
<meta name="description" content="Lookup domain and IP registration details using RDAP (WHOIS-style data) directly in your browser for quick security investigations."/>
<link rel="canonical" href="https://onlinedevtools.app/whois-lookup"/><link rel="stylesheet" href="/assets/site.css">
<script>async function loadPartials(){const [h,f]=await Promise.all([fetch('/partials/header.html'),fetch('/partials/footer.html')]);document.getElementById('siteHeader').innerHTML=await h.text();document.getElementById('siteFooter').innerHTML=await f.text();}
async function lookup(){const q=document.getElementById('query').value.trim();if(!q)return;document.getElementById("status").textContent='Looking up RDAP...';try{const isIp=/^\d+\.\d+\.\d+\.\d+$/.test(q);const url=isIp?`https://rdap.arin.net/registry/ip/${q}`:`https://rdap.org/domain/${encodeURIComponent(q)}`;const r=await fetch(url);const data=await r.json();document.getElementById('out').value=JSON.stringify(data,null,2);document.getElementById("status").textContent='Lookup complete.';}catch(e){document.getElementById("status").textContent='Lookup failed (provider/CORS limitation): '+e.message;}}</script></head>
<body onload="loadPartials()"><div class="page"><div id="siteHeader"></div><main><div class="wrap"><section class="grid"><div class="card"><div class="pad"><nav class="breadcrumbs"><a href="/">Home</a> / <a href="/tools">Tools</a> / WHOIS Lookup</nav><h1 class="h1">WHOIS Lookup (RDAP)</h1><input id="query" class="in" placeholder="example.com or 8.8.8.8"/><div style="margin-top:10px"><button class="pill" onclick="lookup()">Lookup</button></div><div id="status" class="muted" style="margin-top:8px"></div></div></div><div class="card"><div class="pad"><h2 class="h2">Result JSON</h2><textarea id="out" class="in" style="min-height:380px"></textarea></div></div></section></div></main><div id="siteFooter"></div></div></body></html>
