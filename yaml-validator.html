<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>YAML Validator & JSON Converter | Online Dev Tools</title>
<meta name="description" content="Validate YAML for CI/CD, Kubernetes, and GitHub Actions. Convert valid YAML to formatted JSON instantly in your browser."/>
<link rel="canonical" href="https://onlinedevtools.app/yaml-validator"/><link rel="stylesheet" href="/assets/site.css">
<script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
<script>async function loadPartials(){const [h,f]=await Promise.all([fetch('/partials/header.html'),fetch('/partials/footer.html')]);document.getElementById('siteHeader').innerHTML=await h.text();document.getElementById('siteFooter').innerHTML=await f.text();}
function validateYaml(){try{const obj=jsyaml.load(document.getElementById('yamlIn').value);document.getElementById('jsonOut').value=JSON.stringify(obj,null,2);document.getElementById('status').textContent='Valid YAML.';}catch(e){document.getElementById('jsonOut').value='';document.getElementById('status').textContent='Invalid YAML: '+e.message;}}</script></head>
<body onload="loadPartials()"><div class="page"><div id="siteHeader"></div><main><div class="wrap"><section class="grid"><div class="card"><div class="pad"><nav class="breadcrumbs"><a href="/">Home</a> / <a href="/tools">Tools</a> / YAML Validator</nav><h1 class="h1">YAML Validator</h1><textarea id="yamlIn" class="in" style="min-height:320px">apiVersion: v1
kind: ConfigMap
metadata:
  name: demo
data:
  env: prod</textarea><div style="margin-top:10px"><button class="pill" onclick="validateYaml()">Validate YAML</button></div><div id="status" class="muted" style="margin-top:8px"></div></div></div><div class="card"><div class="pad"><h2 class="h2">JSON Output</h2><textarea id="jsonOut" class="in" style="min-height:380px"></textarea></div></div></section></div></main><div id="siteFooter"></div></div></body></html>
