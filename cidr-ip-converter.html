<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>CIDR / IP Converter & Range Calculator | Online Dev Tools</title>
<meta name="description" content="Convert CIDR blocks to start/end IP ranges and estimate host counts. Handy for subnet planning and security troubleshooting."/>
<link rel="canonical" href="https://onlinedevtools.app/cidr-ip-converter"/><link rel="stylesheet" href="/assets/site.css">
<script>async function loadPartials(){const [h,f]=await Promise.all([fetch('/partials/header.html'),fetch('/partials/footer.html')]);document.getElementById('siteHeader').innerHTML=await h.text();document.getElementById('siteFooter').innerHTML=await f.text();}
const ipToInt=ip=>ip.split('.').reduce((a,o)=>(a<<8)+(+o),0)>>>0;const intToIp=n=>[24,16,8,0].map(s=>(n>>>s)&255).join('.');
function calc(){try{const [ip,pfxs]=document.getElementById("cidr").value.trim().split('/');const p=+pfxs;const mask=p===0?0:((0xffffffff<<(32-p))>>>0);const base=ipToInt(ip)&mask;const end=(base|(~mask>>>0))>>>0;const hosts=Math.max((2**(32-p))-2,0);document.getElementById("out").value=`Network: ${intToIp(base)}/${p}\nMask: ${intToIp(mask)}\nFirst: ${intToIp(base+1)}\nLast: ${intToIp(end-1)}\nBroadcast: ${intToIp(end)}\nUsable hosts: ${hosts}`;}catch(e){document.getElementById("out").value='Invalid CIDR';}}</script></head>
<body onload="loadPartials()"><div class="page"><div id="siteHeader"></div><main><div class="wrap"><section class="grid"><div class="card"><div class="pad"><nav class="breadcrumbs"><a href="/">Home</a> / <a href="/tools">Tools</a> / CIDR/IP Converter</nav><h1 class="h1">CIDR / IP Converter</h1><input id="cidr" class="in" value="10.0.0.0/24"/><div style="margin-top:10px"><button class="pill" onclick="calc()">Calculate Range</button></div></div></div><div class="card"><div class="pad"><h2 class="h2">Range details</h2><textarea id="out" class="in" style="min-height:320px"></textarea></div></div></section></div></main><div id="siteFooter"></div></div></body></html>
