<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Diff Checker (Line-by-Line) | Online Dev Tools</title>
<meta name="description" content="Compare two text blocks side-by-side and identify added, removed, and changed lines. Useful for config, policy, and payload diffs."/>
<link rel="canonical" href="https://onlinedevtools.app/diff-checker"/><link rel="stylesheet" href="/assets/site.css">
<script>async function loadPartials(){const [h,f]=await Promise.all([fetch('/partials/header.html'),fetch('/partials/footer.html')]);document.getElementById('siteHeader').innerHTML=await h.text();document.getElementById('siteFooter').innerHTML=await f.text();}
function runDiff(){const a=document.getElementById("left").value.split('\n'),b=document.getElementById("right").value.split('\n');const len=Math.max(a.length,b.length);const out=[];for(let i=0;i<len;i++){if(a[i]===b[i])continue;if(a[i]!==undefined)out.push(`- ${i+1}: ${a[i]}`);if(b[i]!==undefined)out.push(`+ ${i+1}: ${b[i]}`);}document.getElementById("result").value=out.join('\n')||'No line differences.';}</script></head>
<body onload="loadPartials()"><div class="page"><div id="siteHeader"></div><main><div class="wrap"><section class="grid"><div class="card"><div class="pad"><nav class="breadcrumbs"><a href="/">Home</a> / <a href="/tools">Tools</a> / Diff Checker</nav><h1 class="h1">Diff Checker</h1><div class="row"><div class="col"><div class="small">Original</div><textarea id="left" class="in" style="min-height:280px">line1
line2
line3</textarea></div><div class="col"><div class="small">Updated</div><textarea id="right" class="in" style="min-height:280px">line1
line2 changed
line4</textarea></div></div><div style="margin-top:10px"><button class="pill" onclick="runDiff()">Compare</button></div></div></div><div class="card"><div class="pad"><h2 class="h2">Line changes</h2><textarea id="result" class="in" style="min-height:380px"></textarea></div></div></section></div></main><div id="siteFooter"></div></div></body></html>
