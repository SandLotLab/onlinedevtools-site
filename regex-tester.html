<script>async function loadPartials(){const [h,f]=await Promise.all([fetch('/partials/header.html'),fetch('/partials/footer.html')]);document.getElementById("siteHeader").innerHTML=await h.text();document.getElementById("siteFooter").innerHTML=await f.text();}
function run(){try{const re=new RegExp(document.getElementById("pattern").value,document.getElementById("flags").value);const txt=document.getElementById("input").value;const out=[];let m;let guard=0;while((m=re.exec(txt))!==null&&guard++<5000){out.push(`Match ${out.length+1}: "${m[0]}" @${m.index}`);if(m.length>1)m.slice(1).forEach((g,i)=>out.push(`  Group ${i+1}: ${g??'null'}`));if(!re.global)break;if(m[0]==='')re.lastIndex++;}document.getElementById("result").value=out.length?out.join('\n'):'No matches.';document.getElementById("status").textContent='Regex compiled successfully.';}catch(e){document.getElementById("status").textContent=e.message;document.getElementById("result").value='';}}</script>
</head><body onload="loadPartials()"><div class="page"><div id="siteHeader"></div><main><div class="wrap"><section class="grid"><div class="card"><div class="pad">

<h1 class="h1">Regular Expression Tester</h1><p class="muted">Test regex, inspect capture groups, and debug pattern flags quickly.</p>
