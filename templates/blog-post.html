<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>{{TITLE}}</title>
  <meta name="description" content="{{DESCRIPTION}}" />
  <link rel="canonical" href="{{CANONICAL_URL}}" />

  <meta property="og:type" content="article" />
  <meta property="og:title" content="{{TITLE}}" />
  <meta property="og:description" content="{{DESCRIPTION}}" />
  <meta property="og:url" content="{{CANONICAL_URL}}" />

  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="{{TITLE}}" />
  <meta name="twitter:description" content="{{DESCRIPTION}}" />

  <link rel="alternate" type="application/rss+xml" title="Online Dev Tools Blog RSS" href="/rss.xml" />
  <link rel="stylesheet" href="/assets/site.css" />
  <script src="/assets/search.js" defer></script>

  <script type="application/ld+json">
{{JSON_LD}}
  </script>
</head>
<body>
  <div id="odt-header"></div>

  <main class="container">
    <article class="blog-post">
      <nav class="post-breadcrumb" aria-label="Breadcrumb">
        <a href="/">Home</a>
        <span class="bc-sep" aria-hidden="true">›</span>
        <a href="/blog">Blog</a>
        <span class="bc-sep" aria-hidden="true">›</span>
        <a href="/blog?filter={{CATEGORY_SLUG}}">{{CATEGORY_LABEL}}</a>
        <span class="bc-sep" aria-hidden="true">›</span>
        <span class="bc-current">{{TITLE_SHORT}}</span>
      </nav>
      <header>
        <h1>{{TITLE}}</h1>
        <p class="post-meta">
          By <span class="post-author">{{AUTHOR}}</span>
          &middot; <time datetime="{{DATE_ISO}}">{{DATE_HUMAN}}</time>
          &middot; <span class="post-reading">{{READING_TIME}}</span>
        </p>
      </header>

      <hr class="post-divider">

      {{BODY_HTML}}

      <section class="post-sources">
        <h2>Sources</h2>
        {{SOURCES_HTML}}
      </section>

      <aside class="post-related">
        <p class="post-related-label">Related articles</p>
        <ul class="post-related-list">
          {{RELATED_HTML}}
        </ul>
      </aside>
    </article>
  </main>

  <div id="odt-footer"></div>

  <script>
    (function () {
      async function inject(id, url) {
        try {
          const r = await fetch(url, { cache: "no-cache" });
          const html = await r.text();
          document.getElementById(id).innerHTML = html;
        } catch (e) {
          console.warn("Partial inject failed:", url, e);
        }
      }
      inject("odt-header", "/partials/header");
      inject("odt-footer", "/partials/footer");
    })();
  </script>
</body>
</html>
