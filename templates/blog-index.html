<!doctype html>
<html lang="en-US">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Blog | Online Dev Tools</title>
  <meta name="description" content="Technical notes, security workflow guides, and tool deep-dives for Online Dev Tools." />
  <link rel="canonical" href="https://onlinedevtools.app/blog" />
  <link rel="alternate" type="application/rss+xml" title="Online Dev Tools Blog RSS" href="/rss.xml" />
  <link rel="stylesheet" href="/assets/site.css" />
</head>
<body>
  <div id="odt-header"></div>

  <main class="container">
    <h1>Blog</h1>
    <p>Twice-weekly technical write-ups that link back to relevant tools and workflows.</p>

    <!-- BLOG_LIST_START -->
    <ul class="blog-list">
      <!-- Worker inserts items here -->
    </ul>
    <!-- BLOG_LIST_END -->
  </main>

  <div id="odt-footer"></div>

  <script>
    (function () {
      async function inject(id, url) {
        try {
          const r = await fetch(url, { cache: "no-cache" });
          const html = await r.text();
          document.getElementById(id).innerHTML = html;
        } catch (e) {
          console.warn("Partial inject failed:", url, e);
        }
      }
      inject("odt-header", "/partials/header");
      inject("odt-footer", "/partials/footer");
    })();
  </script>
</body>
</html>
