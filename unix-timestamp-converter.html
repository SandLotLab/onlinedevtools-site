<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>UNIX Timestamp Converter (Epoch) | Online Dev Tools</title>
<meta name="description" content="Convert UNIX timestamps to readable UTC/local dates and convert datetime back to epoch seconds or milliseconds."/>
<link rel="canonical" href="https://onlinedevtools.app/unix-timestamp-converter"/><link rel="stylesheet" href="/assets/site.css">
<script>async function loadPartials(){const [h,f]=await Promise.all([fetch('/partials/header.html'),fetch('/partials/footer.html')]);document.getElementById("siteHeader").innerHTML=await h.text();document.getElementById("siteFooter").innerHTML=await f.text();}
function toDate(){const raw=Number(document.getElementById("ts").value.trim());if(Number.isNaN(raw)) return document.getElementById("out").value='Invalid timestamp';const ms=raw>1e12?raw:raw*1000;const d=new Date(ms);document.getElementById("out").value=`UTC: ${d.toUTCString()}\nISO: ${d.toISOString()}\nLocal: ${d.toString()}`;}
function toTs(){const d=new Date(document.getElementById("dt").value);if(isNaN(d)) return document.getElementById("out").value='Invalid datetime';document.getElementById("out").value=`Seconds: ${Math.floor(d.getTime()/1000)}\nMilliseconds: ${d.getTime()}`;}</script></head>
<body onload="loadPartials()"><div class="page"><div id="siteHeader"></div><main><div class="wrap"><section class="grid"><div class="card"><div class="pad"><nav class="breadcrumbs"><a href="/">Home</a> / <a href="/tools">Tools</a> / UNIX Timestamp Converter</nav><h1 class="h1">UNIX Timestamp Converter</h1><div class="small">Epoch timestamp</div><input id="ts" class="in" value="1700000000"/><div style="margin-top:10px"><button class="pill" onclick="toDate()">Convert to Date</button></div><div class="small" style="margin-top:10px">Date/time</div><input id="dt" class="in" type="datetime-local"/><div style="margin-top:10px"><button class="pill" onclick="toTs()">Convert to Timestamp</button></div></div></div><div class="card"><div class="pad"><h2 class="h2">Result</h2><textarea id="out" class="in" style="min-height:360px"></textarea></div></div></section></div></main><div id="siteFooter"></div></div></body></html>
