<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>JSON Editor & Validator | Online Dev Tools</title>
<meta name="description" content="Edit, validate, prettify, minify, and sort JSON keys in your browser. Fast JSON editor for API payloads and config files."/>
<link rel="canonical" href="https://onlinedevtools.app/json-editor"/><link rel="stylesheet" href="/assets/site.css">
<script>async function loadPartials(){const [h,f]=await Promise.all([fetch('/partials/header.html'),fetch('/partials/footer.html')]);document.getElementById('siteHeader').innerHTML=await h.text();document.getElementById('siteFooter').innerHTML=await f.text();}
function parse(){return JSON.parse(document.getElementById('jsonIn').value);}function update(fn){try{const obj=fn(parse());document.getElementById('jsonIn').value=typeof obj==='string'?obj:JSON.stringify(obj,null,2);document.getElementById("status").textContent='Success';}catch(e){document.getElementById("status").textContent=e.message;}}
const sortKeys=o=>Array.isArray(o)?o.map(sortKeys):o&&typeof o==='object'?Object.fromEntries(Object.keys(o).sort().map(k=>[k,sortKeys(o[k])])):o;
</script></head><body onload="loadPartials()"><div class="page"><div id="siteHeader"></div><main><div class="wrap"><section class="card" style="margin-top:22px"><div class="pad"><nav class="breadcrumbs"><a href="/">Home</a> / <a href="/tools">Tools</a> / JSON Editor</nav><h1 class="h1">JSON Editor</h1><p class="muted">Edit, lint, and normalize JSON quickly.</p><textarea id="jsonIn" class="in" style="min-height:420px">{"service":"odt","env":"prod"}</textarea><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px"><button class="pill" onclick="update(o=>o)">Validate</button><button class="pill" onclick="update(o=>o)">Prettify</button><button class="pill" onclick="update(o=>JSON.stringify(o))">Minify</button><button class="pill" onclick="update(sortKeys)">Sort keys</button></div><div id="status" class="muted" style="margin-top:8px"></div></div></section></div></main><div id="siteFooter"></div></div></body></html>
