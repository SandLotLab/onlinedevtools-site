<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Base64 Encoder & Decoder (UTF-8) | Online Dev Tools</title>
<meta name="description" content="Encode and decode Base64 text quickly with UTF-8 support. Useful for JWT segments, headers, payloads, and API debugging."/>
<link rel="canonical" href="https://onlinedevtools.app/base64-encoder-decoder"/><link rel="stylesheet" href="/assets/site.css">
<script>async function loadPartials(){const [h,f]=await Promise.all([fetch('/partials/header.html'),fetch('/partials/footer.html')]);document.getElementById('siteHeader').innerHTML=await h.text();document.getElementById('siteFooter').innerHTML=await f.text();}
const toB64=s=>btoa(unescape(encodeURIComponent(s))); const fromB64=s=>decodeURIComponent(escape(atob(s.replace(/-/g,'+').replace(/_/g,'/'))));
function enc(){try{document.getElementById("out").value=toB64(document.getElementById("inp").value);document.getElementById("stat").textContent='Encoded.';}catch(e){document.getElementById("stat").textContent=e.message;}} function dec(){try{document.getElementById("out").value=fromB64(document.getElementById("inp").value.trim());document.getElementById("stat").textContent='Decoded.';}catch(e){document.getElementById("stat").textContent=e.message;}}</script></head>
<body onload="loadPartials()"><div class="page"><div id="siteHeader"></div><main><div class="wrap"><section class="grid"><div class="card"><div class="pad"><nav class="breadcrumbs"><a href="/">Home</a> / <a href="/tools">Tools</a> / Base64 Encoder/Decoder</nav><h1 class="h1">Base64 Encoder / Decoder</h1><textarea id="inp" class="in" style="min-height:280px">hello world</textarea><div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:10px"><button class="pill" onclick="enc()">Encode</button><button class="pill" onclick="dec()">Decode</button></div><div id="stat" class="muted" style="margin-top:8px"></div></div></div><div class="card"><div class="pad"><h2 class="h2">Output</h2><textarea id="out" class="in" style="min-height:360px"></textarea></div></div></section></div></main><div id="siteFooter"></div></div></body></html>
