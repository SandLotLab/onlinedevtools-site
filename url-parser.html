<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>URL Parser & Query String Splitter | Online Dev Tools</title>
<meta name="description" content="Parse URLs into protocol, host, path, hash, and query params. Decode and inspect query strings for API callbacks and redirects."/>
<link rel="canonical" href="https://onlinedevtools.app/url-parser"/><link rel="stylesheet" href="/assets/site.css">
<script>async function loadPartials(){const [h,f]=await Promise.all([fetch('/partials/header.html'),fetch('/partials/footer.html')]);document.getElementById('siteHeader').innerHTML=await h.text();document.getElementById('siteFooter').innerHTML=await f.text();}
function parseUrl(){try{const u=new URL(document.getElementById('urlIn').value.trim());const p=[];u.searchParams.forEach((v,k)=>p.push(`${k} = ${v}`));document.getElementById('parts').value=`href: ${u.href}\nprotocol: ${u.protocol}\nhost: ${u.host}\npathname: ${u.pathname}\nsearch: ${u.search}\nhash: ${u.hash}`;document.getElementById('query').value=p.join('\n')||'No query params';}catch(e){document.getElementById('parts').value='Invalid URL';document.getElementById('query').value=e.message;}}</script>
</head><body onload="loadPartials()"><div class="page"><div id="siteHeader"></div><main><div class="wrap"><section class="grid"><div class="card"><div class="pad">
<nav class="breadcrumbs"><a href="/">Home</a> / <a href="/tools">Tools</a> / URL Parser</nav><h1 class="h1">URL Parser / Query String Splitter</h1>
<textarea id="urlIn" class="in" style="min-height:130px">https://example.com/callback?code=abc123&state=signed-in#done</textarea><div style="margin-top:10px"><button class="pill" onclick="parseUrl()">Parse URL</button></div></div></div>
<div class="card"><div class="pad"><h2 class="h2">Parsed URL</h2><textarea id="parts" class="in" style="min-height:150px"></textarea><h2 class="h2" style="margin-top:10px">Query Params</h2><textarea id="query" class="in" style="min-height:150px"></textarea></div></div></section></div></main><div id="siteFooter"></div></div></body></html>
